<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Pipeline Active</title>
    <!-- Bootstrap 5 CSS CDN for beautiful components -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            color: #ffffff;
            display: flex;
            align-items: center;
        }
        .card-custom {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }
        .pulse-badge {
            background-color: #10b981;
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card card-custom p-5 shadow-lg">
                    <div class="d-inline-block mx-auto mb-3 px-3 py-1 rounded-pill pulse-badge text-white fw-bold small">
                        🚀 Pipeline Live
                    </div>
                    <h1 class="display-5 fw-extrabold mb-3 text-transparent bg-clip-text bg-gradient-to-r text-info">
                        CI/CD Fully Operational
                    </h1>
                    <p class="lead text-muted mb-4">
                        This web application was successfully packaged via Docker Hub and deployed continuously onto Amazon ECS with AWS Fargate.
                    </p>
                    <div class="p-3 bg-dark bg-opacity-50 rounded-3 text-start small border border-secondary">
                        <code class="text-warning">$ git push origin main</code><br>
                        <span class="text-light-50">Status: Automated rolling-update successful.</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
